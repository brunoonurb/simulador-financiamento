<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Financiamento de Veículo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🚗 Simulador de Financiamento</h1>
      <nav>
        <a href="index.html" class="active">Simulador</a>
        <a href="admin.html">Gerenciar Taxas</a>
      </nav>
    </header>

    <div class="card">
      <h2>Dados da simulação</h2>
      <form id="form-simulacao">
        <div class="form-grid">
          <div>
            <label>Valor total do veículo (R$)</label>
            <input type="number" id="valorTotal" step="0.01" min="1" placeholder="Ex.: 80000" required>
          </div>
          <div>
            <label>Valor de entrada (R$)</label>
            <input type="number" id="valorEntrada" step="0.01" min="0" placeholder="Ex.: 20000" required>
          </div>
          <div>
            <label>Número de parcelas</label>
            <input type="number" id="parcelas" min="1" max="120" placeholder="Ex.: 48" required>
          </div>
        </div>
        <div class="btn-row">
          <button type="submit" class="btn-primary">Simular</button>
          <button type="reset" class="btn-secondary">Limpar</button>
        </div>
      </form>
    </div>

    <div id="resultado"></div>

    <p class="fonte">Taxas baseadas em pesquisa de mercado (abril/2026). Valores aproximados — confirme com o banco.</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
