<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="Arial" font-size="11">
  <!-- ceu -->
  <rect width="800" height="200" fill="#e8f4ff"/>
  <!-- chao -->
  <rect y="200" width="800" height="120" fill="#d4c8a8"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#aa9" stroke-width="1"/>

  <!-- silhueta Doblo (vista lateral simplificada) -->
  <g>
    <!-- corpo principal -->
    <path d="M 80 200 L 80 130 L 100 110 L 200 100 L 200 80 L 280 80 L 280 100 L 700 100 L 720 130 L 720 200 Z"
          fill="#fff" stroke="#222" stroke-width="2"/>

    <!-- janela parabrisa -->
    <path d="M 100 110 L 200 100 L 200 130 L 100 130 Z" fill="#cce5ff" stroke="#222"/>

    <!-- janela lateral motorista (frente) -->
    <rect x="210" y="105" width="60" height="35" fill="#cce5ff" stroke="#222"/>

    <!-- janela lateral traseira (com mosquiteira) -->
    <rect x="290" y="105" width="120" height="40" fill="#cce5ff" stroke="#222"/>
    <text x="350" y="160" text-anchor="middle" font-size="9" fill="#060">↑ janela com tela mosquiteira</text>
    <!-- pattern de mosquiteira -->
    <pattern id="mesh" patternUnits="userSpaceOnUse" width="4" height="4">
      <path d="M 0 0 L 4 4 M 4 0 L 0 4" stroke="#888" stroke-width="0.3"/>
    </pattern>
    <rect x="290" y="105" width="60" height="40" fill="url(#mesh)" opacity="0.6"/>

    <!-- janela traseira -->
    <rect x="430" y="105" width="240" height="40" fill="#cce5ff" stroke="#222"/>

    <!-- placa solar no teto -->
    <rect x="280" y="76" width="280" height="6" fill="#1a3a5c" stroke="#000"/>
    <line x1="280" y1="79" x2="560" y2="79" stroke="#3a5a7c" stroke-width="0.5"/>
    <text x="420" y="72" text-anchor="middle" font-size="9" fill="#1a3a5c">PLACA SOLAR (~150W)</text>

    <!-- exaustor de teto -->
    <rect x="580" y="74" width="40" height="8" fill="#666" stroke="#000"/>
    <text x="600" y="68" text-anchor="middle" font-size="9">EXAUSTOR</text>
    <circle cx="600" cy="78" r="2" fill="#fff"/>

    <!-- rodas -->
    <circle cx="160" cy="210" r="28" fill="#222"/>
    <circle cx="160" cy="210" r="18" fill="#666"/>
    <circle cx="160" cy="210" r="6" fill="#222"/>
    <circle cx="640" cy="210" r="28" fill="#222"/>
    <circle cx="640" cy="210" r="18" fill="#666"/>
    <circle cx="640" cy="210" r="6" fill="#222"/>

    <!-- farol -->
    <ellipse cx="88" cy="155" rx="6" ry="10" fill="#ffe680" stroke="#222"/>

    <!-- maçaneta porta -->
    <rect x="240" y="160" width="20" height="3" fill="#666"/>
    <rect x="370" y="160" width="20" height="3" fill="#666"/>

    <!-- linha porta lateral -->
    <line x1="280" y1="100" x2="280" y2="200" stroke="#666" stroke-width="0.5"/>
    <line x1="410" y1="100" x2="410" y2="200" stroke="#666" stroke-width="0.5"/>

    <!-- reservatorio agua (sob assoalho) -->
    <rect x="350" y="200" width="200" height="20" fill="#cce5ff" stroke="#369" stroke-dasharray="3"/>
    <text x="450" y="214" text-anchor="middle" font-size="9" fill="#369">RESERV. ÁGUA (sob chassi)</text>

    <!-- tomada shore power -->
    <rect x="700" y="160" width="14" height="10" fill="#fc6" stroke="#222"/>
    <text x="707" y="180" text-anchor="middle" font-size="8">220V</text>

  </g>

  <!-- legenda -->
  <text x="400" y="295" text-anchor="middle" font-size="11" font-weight="bold">FIAT Doblò 2015 — vista lateral (lado motorista)</text>
  <text x="400" y="310" text-anchor="middle" font-size="9" fill="#666">esquema ilustrativo · não em escala</text>
</svg>
