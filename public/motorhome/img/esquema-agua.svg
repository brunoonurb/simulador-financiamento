<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial" font-size="11">
  <defs>
    <marker id="arrowB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#369"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="#fafbfc"/>
  <text x="400" y="25" text-anchor="middle" font-size="16" font-weight="bold">Sistema de Água — Motorhome Doblò</text>

  <!-- silhueta lateral simplificada -->
  <g opacity="0.3">
    <path d="M 50 200 L 50 130 L 70 110 L 750 110 L 750 200 Z" fill="#fff" stroke="#888"/>
    <line x1="50" y1="200" x2="750" y2="200" stroke="#888"/>
    <text x="400" y="160" text-anchor="middle" font-size="14" fill="#aaa">interior do veículo</text>
  </g>

  <!-- cuba -->
  <g>
    <rect x="500" y="170" width="80" height="30" fill="#cdf" stroke="#369" stroke-width="2"/>
    <text x="540" y="190" text-anchor="middle" font-size="10" font-weight="bold">CUBA / PIA</text>
    <!-- torneira -->
    <path d="M 540 170 L 540 155 L 555 155 L 555 165" stroke="#666" stroke-width="2" fill="none"/>
    <text x="565" y="160" font-size="9">torneira</text>
  </g>

  <!-- reservatorio agua limpa (sob assoalho) -->
  <g>
    <rect x="200" y="240" width="180" height="50" fill="#cce5ff" stroke="#369" stroke-width="2" rx="4"/>
    <text x="290" y="262" text-anchor="middle" font-weight="bold">💧 ÁGUA LIMPA</text>
    <text x="290" y="280" text-anchor="middle" font-size="10">~40-60L · sob chassi</text>
  </g>

  <!-- reservatorio agua cinza -->
  <g>
    <rect x="450" y="310" width="180" height="50" fill="#d8c8b8" stroke="#964" stroke-width="2" rx="4"/>
    <text x="540" y="332" text-anchor="middle" font-weight="bold">🪣 ÁGUA CINZA</text>
    <text x="540" y="350" text-anchor="middle" font-size="10">~30-40L · sob chassi</text>
  </g>

  <!-- bomba -->
  <g>
    <circle cx="430" cy="265" r="22" fill="#fff3cd" stroke="#a80" stroke-width="2"/>
    <text x="430" y="263" text-anchor="middle" font-size="10" font-weight="bold">⚡ BOMBA</text>
    <text x="430" y="276" text-anchor="middle" font-size="9">12V c/ pressostato</text>
  </g>

  <!-- canos -->
  <g stroke="#369" stroke-width="3" fill="none">
    <!-- limpa -> bomba -->
    <line x1="380" y1="265" x2="408" y2="265" marker-end="url(#arrowB)"/>
    <!-- bomba -> torneira -->
    <path d="M 452 265 Q 480 265 490 200 L 540 165" marker-end="url(#arrowB)"/>
  </g>

  <g stroke="#964" stroke-width="3" fill="none">
    <!-- cuba -> esgoto cinza -->
    <path d="M 540 200 L 540 310" marker-end="url(#arrowB)"/>
  </g>

  <!-- enchimento (boca de enchimento externa) -->
  <g>
    <circle cx="200" cy="265" r="15" fill="#fff" stroke="#369" stroke-width="2" stroke-dasharray="3"/>
    <text x="170" y="270" text-anchor="end" font-size="10">enchimento ←</text>
    <text x="170" y="282" text-anchor="end" font-size="9" font-style="italic">(externo)</text>
  </g>

  <!-- dreno cinza -->
  <g>
    <rect x="615" y="328" width="20" height="14" fill="#fff" stroke="#964" stroke-width="2" stroke-dasharray="3"/>
    <text x="655" y="338" font-size="10">→ dreno</text>
    <text x="655" y="350" font-size="9" font-style="italic">(em campings)</text>
  </g>

  <!-- legenda -->
  <g transform="translate(60,310)">
    <text font-size="11" font-weight="bold">Legenda:</text>
    <line x1="0" y1="15" x2="30" y2="15" stroke="#369" stroke-width="3"/>
    <text x="40" y="19" font-size="10">água limpa (pressurizada)</text>
    <line x1="0" y1="35" x2="30" y2="35" stroke="#964" stroke-width="3"/>
    <text x="40" y="39" font-size="10">água cinza (gravidade)</text>
  </g>
</svg>
