<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 380" font-family="Arial" font-size="11">
  <!-- ceu -->
  <rect width="1100" height="240" fill="#e8f4ff"/>
  <!-- chao -->
  <rect y="240" width="1100" height="140" fill="#d4c8a8"/>
  <line x1="0" y1="240" x2="1100" y2="240" stroke="#aa9" stroke-width="1"/>

  <!-- ===== Doblò (vista lateral simplificada) ===== -->
  <g>
    <!-- corpo principal: cargo floor a y=200, teto a y=80 -->
    <path d="M 80 200 L 80 130 L 100 110 L 200 100 L 200 80 L 280 80 L 280 100 L 700 100 L 720 130 L 720 200 Z"
          fill="#fff" stroke="#222" stroke-width="2"/>

    <!-- janela parabrisa -->
    <path d="M 100 110 L 200 100 L 200 130 L 100 130 Z" fill="#cce5ff" stroke="#222"/>
    <!-- janelas laterais -->
    <rect x="210" y="105" width="60" height="35" fill="#cce5ff" stroke="#222"/>
    <rect x="290" y="105" width="120" height="40" fill="#cce5ff" stroke="#222"/>
    <rect x="430" y="105" width="240" height="40" fill="#cce5ff" stroke="#222"/>

    <!-- placa solar -->
    <rect x="280" y="76" width="280" height="6" fill="#1a3a5c" stroke="#000"/>
    <text x="420" y="72" text-anchor="middle" font-size="9" fill="#1a3a5c">PLACA SOLAR (~150W)</text>

    <!-- exaustor -->
    <rect x="580" y="74" width="40" height="8" fill="#666" stroke="#000"/>
    <text x="600" y="68" text-anchor="middle" font-size="9">EXAUSTOR</text>

    <!-- rodas -->
    <circle cx="160" cy="220" r="28" fill="#222"/><circle cx="160" cy="220" r="18" fill="#666"/>
    <circle cx="640" cy="220" r="28" fill="#222"/><circle cx="640" cy="220" r="18" fill="#666"/>

    <!-- farol -->
    <ellipse cx="88" cy="155" rx="6" ry="10" fill="#ffe680" stroke="#222"/>

    <!-- tampa traseira ABERTA (paralela ao teto, dobrada para cima/trás) -->
    <line x1="700" y1="80" x2="720" y2="100" stroke="#222" stroke-width="1.5"/>
    <path d="M 720 100 L 920 80 L 940 90 L 730 110 Z" fill="#eef" stroke="#222" stroke-width="1.5"/>
    <text x="830" y="73" text-anchor="middle" font-size="9" fill="#444">tampa Doblò levantada</text>
  </g>

  <!-- ===== MÓDULO SLIDE-OUT ESTENDIDO ===== -->
  <g>
    <!-- trilhos telescópicos (parte interna do bagageiro até fora) -->
    <line x1="600" y1="198" x2="980" y2="198" stroke="#999" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="600" y1="202" x2="980" y2="202" stroke="#999" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="780" y="215" text-anchor="middle" font-size="9" fill="#666">trilhos telescópicos (carga pesada)</text>

    <!-- caixa do módulo - corpo principal -->
    <rect x="730" y="105" width="240" height="95" fill="#d8d8dc" stroke="#222" stroke-width="2"/>
    <!-- frame -->
    <rect x="730" y="105" width="240" height="95" fill="none" stroke="#666" stroke-width="0.5"/>
    <!-- linhas horizontais decorativas (chapa) -->
    <line x1="730" y1="125" x2="970" y2="125" stroke="#aaa" stroke-width="0.5"/>
    <line x1="730" y1="155" x2="970" y2="155" stroke="#aaa" stroke-width="0.5"/>
    <line x1="730" y1="180" x2="970" y2="180" stroke="#aaa" stroke-width="0.5"/>

    <!-- dobradiças/trincos canto -->
    <rect x="734" y="110" width="6" height="14" fill="#c90"/>
    <rect x="734" y="184" width="6" height="14" fill="#c90"/>
    <rect x="960" y="110" width="6" height="14" fill="#c90"/>
    <rect x="960" y="184" width="6" height="14" fill="#c90"/>

    <!-- portinhola interna do módulo (acesso pela van) -->
    <rect x="735" y="115" width="8" height="80" fill="none" stroke="#444" stroke-dasharray="2"/>

    <!-- maçaneta externa -->
    <rect x="840" y="150" width="20" height="10" fill="#333" stroke="#000"/>
    <text x="850" y="168" text-anchor="middle" font-size="8" fill="#fff">DOBLÒ</text>

    <!-- ===== DROP-FLOOR descido ===== -->
    <!-- piso articulado descido (parte central do módulo, ~700mm largura) -->
    <g>
      <!-- vão lateral do drop-floor (cutaway visual) -->
      <rect x="800" y="200" width="120" height="40" fill="#f0f0f4" stroke="#222" stroke-width="1.5"/>
      <!-- piso de fundo do drop -->
      <rect x="800" y="235" width="120" height="5" fill="#888" stroke="#222"/>

      <!-- saia/cortina lateral (lona) -->
      <path d="M 800 200 Q 798 220 800 240 L 920 240 Q 922 220 920 200"
            fill="#5b6b7c" opacity="0.85" stroke="#333" stroke-width="0.5"/>
      <text x="860" y="222" text-anchor="middle" font-size="8" fill="#fff">saia em lona</text>

      <!-- indicador de articulação (dobradiça atrás) -->
      <circle cx="920" cy="200" r="3" fill="#c90" stroke="#222"/>
      <text x="935" y="202" font-size="8" fill="#444">dobradiça</text>

      <!-- pessoa em pé (silhueta) dentro do drop -->
      <g opacity="0.6">
        <circle cx="858" cy="125" r="7" fill="#0f5c9e"/>
        <rect x="852" y="132" width="12" height="35" fill="#0f5c9e"/>
        <rect x="854" y="167" width="4" height="28" fill="#0f5c9e"/>
        <rect x="860" y="167" width="4" height="28" fill="#0f5c9e"/>
        <rect x="858" y="195" width="6" height="35" fill="#0f5c9e"/>
        <rect x="852" y="195" width="6" height="35" fill="#0f5c9e"/>
      </g>
      <text x="860" y="120" text-anchor="middle" font-size="8" fill="#0f5c9e">pessoa de pé</text>
    </g>

    <!-- pés de apoio externos (calços telescópicos) -->
    <line x1="745" y1="200" x2="745" y2="240" stroke="#333" stroke-width="3"/>
    <rect x="740" y="238" width="10" height="4" fill="#333"/>
    <line x1="955" y1="200" x2="955" y2="240" stroke="#333" stroke-width="3"/>
    <rect x="950" y="238" width="10" height="4" fill="#333"/>
    <text x="745" y="255" text-anchor="middle" font-size="8" fill="#333">pé</text>
    <text x="955" y="255" text-anchor="middle" font-size="8" fill="#333">pé</text>
  </g>

  <!-- ===== COTAS ===== -->
  <g stroke="#a00" stroke-width="0.8" fill="#a00" font-size="10">
    <!-- altura externa módulo (1050mm) -->
    <line x1="985" y1="105" x2="985" y2="200" />
    <line x1="980" y1="105" x2="990" y2="105" />
    <line x1="980" y1="200" x2="990" y2="200" />
    <text x="995" y="155" font-weight="bold">1.050 mm</text>

    <!-- profundidade slide-out -->
    <line x1="720" y1="265" x2="970" y2="265" />
    <line x1="720" y1="260" x2="720" y2="270" />
    <line x1="970" y1="260" x2="970" y2="270" />
    <text x="845" y="278" text-anchor="middle" font-weight="bold">~1.100 mm (slide aberto)</text>

    <!-- altura útil interna (drop floor) -->
    <line x1="780" y1="115" x2="780" y2="235" />
    <line x1="775" y1="115" x2="785" y2="115" />
    <line x1="775" y1="235" x2="785" y2="235" />
    <text x="772" y="180" text-anchor="end" font-weight="bold">~1,80 m</text>
    <text x="772" y="192" text-anchor="end">altura útil</text>
  </g>

  <!-- legendas -->
  <text x="550" y="335" text-anchor="middle" font-size="12" font-weight="bold">Doblò Slide-Out — módulo traseiro estendido com drop-floor descido</text>
  <text x="550" y="352" text-anchor="middle" font-size="9" fill="#666">esquema ilustrativo · não em escala</text>
  <text x="550" y="367" text-anchor="middle" font-size="9" fill="#666">veículo parado, em modo acampamento — para uso em movimento o módulo retrai e trava</text>
</svg>
