<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial" font-size="11">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#444"/>
    </marker>
  </defs>

  <!-- fundo -->
  <rect width="900" height="500" fill="#fafbfc"/>
  <text x="450" y="25" text-anchor="middle" font-size="16" font-weight="bold">Sistema Elétrico — Motorhome Doblò</text>

  <!-- FONTES (topo) -->
  <g>
    <!-- placa solar -->
    <rect x="50" y="60" width="140" height="60" fill="#fff3cd" stroke="#a80" stroke-width="2" rx="6"/>
    <text x="120" y="82" text-anchor="middle" font-weight="bold">☀ PLACA SOLAR</text>
    <text x="120" y="98" text-anchor="middle" font-size="10">~150W / 12V</text>
    <text x="120" y="112" text-anchor="middle" font-size="10">no teto</text>

    <!-- alternador -->
    <rect x="220" y="60" width="140" height="60" fill="#fff3cd" stroke="#a80" stroke-width="2" rx="6"/>
    <text x="290" y="82" text-anchor="middle" font-weight="bold">🚗 ALTERNADOR</text>
    <text x="290" y="98" text-anchor="middle" font-size="10">veículo (12V)</text>
    <text x="290" y="112" text-anchor="middle" font-size="10">só com motor ligado</text>

    <!-- shore power -->
    <rect x="390" y="60" width="140" height="60" fill="#fff3cd" stroke="#a80" stroke-width="2" rx="6"/>
    <text x="460" y="82" text-anchor="middle" font-weight="bold">🔌 SHORE POWER</text>
    <text x="460" y="98" text-anchor="middle" font-size="10">tomada 110/220V</text>
    <text x="460" y="112" text-anchor="middle" font-size="10">camping/casa</text>
  </g>

  <!-- CONTROLADORES -->
  <g>
    <rect x="50" y="160" width="140" height="50" fill="#d4edda" stroke="#283" stroke-width="1.5" rx="6"/>
    <text x="120" y="180" text-anchor="middle" font-size="11">Controlador MPPT</text>
    <text x="120" y="195" text-anchor="middle" font-size="9">solar charge</text>

    <rect x="220" y="160" width="140" height="50" fill="#d4edda" stroke="#283" stroke-width="1.5" rx="6"/>
    <text x="290" y="180" text-anchor="middle" font-size="11">DC-DC Charger</text>
    <text x="290" y="195" text-anchor="middle" font-size="9">isolador alternador</text>

    <rect x="390" y="160" width="140" height="50" fill="#d4edda" stroke="#283" stroke-width="1.5" rx="6"/>
    <text x="460" y="180" text-anchor="middle" font-size="11">Carregador AC/DC</text>
    <text x="460" y="195" text-anchor="middle" font-size="9">110V → 12V</text>
  </g>

  <!-- Setas fontes -> controladores -->
  <line x1="120" y1="120" x2="120" y2="158" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="290" y1="120" x2="290" y2="158" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="120" x2="460" y2="158" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- BATERIA AUXILIAR (centro) -->
  <g>
    <rect x="220" y="260" width="320" height="80" fill="#cce5ff" stroke="#147" stroke-width="3" rx="8"/>
    <text x="380" y="290" text-anchor="middle" font-size="14" font-weight="bold">🔋 BATERIA AUXILIAR</text>
    <text x="380" y="308" text-anchor="middle" font-size="11">deep cycle 12V · 100-150 Ah</text>
    <text x="380" y="324" text-anchor="middle" font-size="10" font-style="italic">(isolada da bateria de partida)</text>
  </g>

  <!-- Setas controladores -> bateria -->
  <line x1="120" y1="210" x2="280" y2="258" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="290" y1="210" x2="360" y2="258" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="210" x2="440" y2="258" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DISTRIBUIÇÃO -->
  <g>
    <rect x="80" y="380" width="180" height="50" fill="#e2e3ff" stroke="#558" stroke-width="1.5" rx="6"/>
    <text x="170" y="402" text-anchor="middle" font-weight="bold">QUADRO 12V</text>
    <text x="170" y="418" text-anchor="middle" font-size="10">disjuntores + fusíveis</text>

    <rect x="500" y="380" width="180" height="50" fill="#e2e3ff" stroke="#558" stroke-width="1.5" rx="6"/>
    <text x="590" y="402" text-anchor="middle" font-weight="bold">INVERSOR 110V</text>
    <text x="590" y="418" text-anchor="middle" font-size="10">~600-1000W puro senoide</text>
  </g>

  <line x1="320" y1="340" x2="200" y2="378" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="440" y1="340" x2="560" y2="378" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- CARGAS 12V -->
  <g>
    <rect x="20" y="455" width="80" height="35" fill="#fff" stroke="#888" rx="4"/>
    <text x="60" y="478" text-anchor="middle" font-size="10">💡 LEDs</text>
    <rect x="110" y="455" width="80" height="35" fill="#fff" stroke="#888" rx="4"/>
    <text x="150" y="478" text-anchor="middle" font-size="10">💧 Bombas</text>
    <rect x="200" y="455" width="80" height="35" fill="#fff" stroke="#888" rx="4"/>
    <text x="240" y="478" text-anchor="middle" font-size="10">🌀 Exaustor</text>
    <rect x="290" y="455" width="80" height="35" fill="#fff" stroke="#888" rx="4"/>
    <text x="330" y="478" text-anchor="middle" font-size="10">📱 USB</text>
  </g>
  <line x1="100" y1="430" x2="60" y2="455" stroke="#666" stroke-width="1"/>
  <line x1="150" y1="430" x2="150" y2="455" stroke="#666" stroke-width="1"/>
  <line x1="200" y1="430" x2="240" y2="455" stroke="#666" stroke-width="1"/>
  <line x1="240" y1="430" x2="330" y2="455" stroke="#666" stroke-width="1"/>

  <!-- CARGAS 110V -->
  <g>
    <rect x="500" y="455" width="80" height="35" fill="#fff" stroke="#888" rx="4"/>
    <text x="540" y="478" text-anchor="middle" font-size="10">🔌 Tomadas</text>
    <rect x="590" y="455" width="80" height="35" fill="#fff" stroke="#888" rx="4"/>
    <text x="630" y="478" text-anchor="middle" font-size="10">📺 Eletro</text>
    <rect x="680" y="455" width="80" height="35" fill="#fff" stroke="#888" rx="4"/>
    <text x="720" y="478" text-anchor="middle" font-size="10">💻 Notebook</text>
  </g>
  <line x1="540" y1="430" x2="540" y2="455" stroke="#666" stroke-width="1"/>
  <line x1="590" y1="430" x2="630" y2="455" stroke="#666" stroke-width="1"/>
  <line x1="640" y1="430" x2="720" y2="455" stroke="#666" stroke-width="1"/>

  <!-- legenda direita -->
  <g transform="translate(720,160)">
    <rect width="160" height="180" fill="#fff" stroke="#ccc" rx="4"/>
    <text x="80" y="20" text-anchor="middle" font-size="11" font-weight="bold">Legenda</text>
    <rect x="10" y="35" width="14" height="14" fill="#fff3cd" stroke="#a80"/>
    <text x="30" y="46" font-size="10">Fonte de energia</text>
    <rect x="10" y="55" width="14" height="14" fill="#d4edda" stroke="#283"/>
    <text x="30" y="66" font-size="10">Controlador / carga</text>
    <rect x="10" y="75" width="14" height="14" fill="#cce5ff" stroke="#147"/>
    <text x="30" y="86" font-size="10">Armazenamento</text>
    <rect x="10" y="95" width="14" height="14" fill="#e2e3ff" stroke="#558"/>
    <text x="30" y="106" font-size="10">Distribuição</text>
    <text x="10" y="130" font-size="9" font-style="italic">Saídas 12V para LEDs,</text>
    <text x="10" y="143" font-size="9" font-style="italic">bombas, exaustor.</text>
    <text x="10" y="160" font-size="9" font-style="italic">Inversor para tomadas</text>
    <text x="10" y="173" font-size="9" font-style="italic">110V internas.</text>
  </g>
</svg>
